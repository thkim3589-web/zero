<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심도측정 시스템 V49.0 (Kakao)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<body class="bg-gray-50 text-gray-900 antialiased safe-bottom">

    <!-- 1. 상단 고정 헤더 -->

        <h1 class="text-lg font-bold text-blue-600 flex items-center gap-2">
            <i class="fa-solid fa-compass-drafting"></i> 심도측정 <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium">V49.0</span>
        </h1>
        <div class="flex items-center gap-1.5 bg-gray-100 px-3 py-1 rounded-full text-sm font-medium text-gray-700">

            <button type="button" id="changeUserBtn" class="ml-2 text-blue-600 text-xs border px-2 py-0.5 rounded">변경</button>
        </div>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 2. 위치 및 주소 카드 (원터치 GPS 통합) -->

                <i class="fa-solid fa-location-dot text-blue-500"></i> 위치 및 주소 정보
            </h2>
            
            <!-- GPS 수집 버튼 (주소조회 통합 컴포넌트) -->

                <i class="fa-solid fa-location-crosshairs text-base animate-pulse"></i>
                현재 위치(GPS) 자동 가져오기
            </button>

            <!-- 주소 매핑 결과 창 -->
            <div class="bg-gray-50 p-3 rounded-lg space-y-2 text-sm border border-gray-100">
                <div class="flex justify-between items-start">
                    <span class="text-gray-400 w-16 font-medium">도로명</span>
                    <span class="text-gray-700 flex-1 font-medium"><span id="roadAddr">도로명 주소를 불러오는 중...</span></span>
                </div>
                <div class="border-t border-gray-200/60 my-1.5"></div>

                    <span class="text-gray-600 flex-1 text-xs font-mono"><span id="jibunAddr">지번을 불러오는 중...</span></span></div><div class="border-t border-gray-200/60 my-1.5"></div><div class="flex justify-between items-start"><span class="text-gray-400 w-16 font-medium">GPS</span><span class="text-gray-600 flex-1 text-xs font-mono"><span id="gpsCoord">GPS를 불러오는 중...</span></span>
                </div>
            </div>
        </section>


        <!-- 관리번호 입력 카드 -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200/80 space-y-3">
            <label for="manageNo" class="text-sm font-bold text-gray-500 flex items-center gap-1.5 uppercase tracking-wider">
                <i class="fa-solid fa-hashtag text-blue-500"></i> 관리번호
            </label>
            <input type="text" id="manageNo" placeholder="예: 달서CD1776"
                   class="w-full bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:bg-white rounded-xl py-3 px-4 text-lg font-semibold text-gray-800 transition-all focus:outline-none">
        </section>

        <!-- 3. 심도 입력 카드 -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200/80 space-y-3">
            <label for="depth" class="text-sm font-bold text-gray-500 flex items-center gap-1.5 uppercase tracking-wider">
                <i class="fa-solid fa-ruler-vertical text-blue-500"></i> 측정 심도 입력
            </label>
            <div class="relative flex items-center">
                <input type="number" id="depth" step="0.01" placeholder="0.00" 
                       class="w-full bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:bg-white rounded-xl py-3.5 px-4 text-2xl font-bold text-gray-800 transition-all text-right pr-12 focus:outline-none">
                <span class="absolute right-4 text-lg font-bold text-gray-400">m</span>

<!-- 7. 하단 고정 메인 액션 버튼 (CTA) -->

            <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
            심도 데이터 저장하기

    </div>


        <!-- 4. 오늘의 통계 대시보드 -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200/80 space-y-3">

        <section class="space-y-2">
            <div class="flex justify-between items-center px-1">

<script>
let currentLat='';
let currentLng='';
let currentAcc='';
const DEPTH_KEY='depth_records_v42';

function loadRecords(){
  return JSON.parse(localStorage.getItem(DEPTH_KEY)||'[]');
}
function saveRecords(arr){
  localStorage.setItem(DEPTH_KEY,JSON.stringify(arr));
}
function refreshStats(){
  const arr=loadRecords();
  const nums=arr.map(x=>Number(x.depth)).filter(x=>!isNaN(x));
  const ps=document.querySelectorAll('p');
  if(nums.length){
    const avg=(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2);
    const max=Math.max(...nums).toFixed(2);
    const min=Math.min(...nums).toFixed(2);
    ps.forEach(p=>{
      if(p.textContent.includes('총 건수')) p.nextElementSibling.innerHTML=`${nums.length} <span class="text-xs">건</span>`;
      if(p.textContent.includes('평균 심도')) p.nextElementSibling.innerHTML=`${avg}<span class="text-xs">m</span>`;
      if(p.textContent.includes('최대/최소')) p.nextElementSibling.textContent=`${max} / ${min}`;
    });
  }
  const sec=[...document.querySelectorAll('section')].find(s=>s.textContent.includes('최근 저장 이력'));
  if(sec){
    sec.querySelectorAll('.record-item').forEach(e=>e.remove());
    arr.slice().reverse().forEach((r,i)=>{
      const d=document.createElement('div');
      d.className='record-item bg-white p-3 rounded-xl shadow-sm border border-gray-200 mt-2';
      d.innerHTML=`
<div class="flex items-start gap-3">
<input type="checkbox" class="w-5 h-5 mt-1">
<div class="flex-1">
  <div class="flex items-center gap-2 mb-1">
    <span class="text-xs bg-gray-100 text-gray-700 font-bold px-2 py-1 rounded">No.${arr.length-i}</span>
    <span class="text-xs text-gray-500">${r.time}</span>
  </div>
  <div class="text-sm font-medium text-gray-800">${r.manageNo?'<div class="text-xs font-bold text-blue-600 mb-1">관리번호 : '+r.manageNo+'</div>':''}${r.address||'주소 없음'}</div>
</div>
<div class="text-right whitespace-nowrap">
  <span class="text-3xl font-black text-gray-900">${Number(r.depth).toFixed(2)}</span><span class="text-base font-bold"> m</span>
</div>
</div>`;
      sec.insertBefore(d,sec.querySelector('.grid'));
    const lastSaved=document.getElementById('lastSavedTime');
    if(lastSaved){
      if(arr.length){
        const dateOnly=arr[arr.length-1].time.split('오전')[0].split('오후')[0].trim();
        lastSaved.textContent='최근 저장 : '+dateOnly;
      }else{
        lastSaved.textContent='';
      }
    }

    });
  }
}
document.addEventListener('DOMContentLoaded',()=>{

 const btn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('심도 데이터 저장'));
 const input=document.getElementById('depth');
 if(btn&&input){
   btn.addEventListener('click',()=>{
      if(btn.disabled) return;
      btn.disabled=true;
      setTimeout(()=>btn.disabled=false,1000);
     const v=parseFloat(input.value);
     if(isNaN(v)){alert('심도를 입력하세요.');return;}
     const arr=loadRecords();
     const addr=document.getElementById('roadAddr')?.textContent || '';const now=new Date();
const time=`${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2,'0')}. ${String(now.getDate()).padStart(2,'0')}. ${now.getHours()<12?'오전':'오후'} ${String((now.getHours()%12)||12).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
const roadAddr=document.getElementById('roadAddr')?.textContent||'';
const jibunAddr=document.getElementById('jibunAddr')?.textContent||'';
const manageNo=document.getElementById('manageNo')?.value||'';
arr.push({manageNo:manageNo,depth:v,time:time,address:addr,roadAddr:roadAddr,jibunAddr:jibunAddr,latitude:currentLat,longitude:currentLng,accuracy:currentAcc});
     saveRecords(arr);
     refreshStats();
     alert('저장되었습니다.');
     input.value='';
   });
 }
 refreshStats();
});
</script>




<script>
document.addEventListener('DOMContentLoaded',()=>{
  const KEY='depth_user_name';
  const nameSpan=document.getElementById('userNameDisplay');
  const btn=document.getElementById('changeUserBtn');
  function load(){
    const n=localStorage.getItem(KEY)||'김태호';
    nameSpan.textContent=n;
  }
  load();
  btn.addEventListener('click',()=>{
      if(btn.disabled) return;
      btn.disabled=true;
      setTimeout(()=>btn.disabled=false,1000);
    const current=localStorage.getItem(KEY)||'김태호';
    const v=prompt('사용자명을 입력하세요.',current);
    if(v && v.trim()){
      localStorage.setItem(KEY,v.trim());
      load();
    }
  });
});
</script><script>

document.addEventListener('DOMContentLoaded',()=>{
  const sec=[...document.querySelectorAll('section')].find(s=>s.textContent.includes('최근 저장 이력'));
  if(!sec) return;
  const buttons=sec.querySelectorAll('.grid button');
  if(buttons.length<2) return;
  const selBtn=buttons[0], allBtn=buttons[1];

  function redraw(){ refreshStats(); }

  selBtn.addEventListener('click',()=>{
    let arr=loadRecords();
    const checks=[...sec.querySelectorAll('.record-item input[type=checkbox], .bg-white input[type=checkbox]')];
    if(arr.length===0){ alert('삭제할 데이터가 없습니다.'); return; }
    const rev=arr.slice().reverse();
    const kept=[];
    rev.forEach((r,i)=>{
      if(!(checks[i] && checks[i].checked)) kept.push(r);
    });
    saveRecords(kept.reverse());
    redraw();
    alert('선택한 항목을 삭제했습니다.');
  });

  allBtn.addEventListener('click',()=>{
    if(!confirm('모든 데이터를 삭제하시겠습니까?')) return;
    localStorage.removeItem(DEPTH_KEY);
    redraw();
    alert('전체 삭제되었습니다.');
  });
});

</script>

<script>
document.addEventListener('DOMContentLoaded',()=>{
 const excelBtn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('엑셀'));
 if(!excelBtn) return;
 excelBtn.addEventListener('click',()=>{
   const data=loadRecords();
   if(!data.length){alert('내보낼 데이터가 없습니다.');return;}
   const rows=data.map((r,i)=>({
번호:i+1,
관리번호:r.manageNo||'',
도로명주소:r.roadAddr||r.address||'',
지번주소:r.jibunAddr||'',
심도_m:r.depth,
측정시간:r.time,
위도:r.latitude||'',
경도:r.longitude||'',
GPS정확도_m:r.accuracy||''
}));
   const ws=XLSX.utils.json_to_sheet(rows);
   const wb=XLSX.utils.book_new();
   XLSX.utils.book_append_sheet(wb,ws,'심도측정');
   const d=new Date();
const fname=`심도측정_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}${String(d.getSeconds()).padStart(2,'0')}.xlsx`;
XLSX.writeFile(wb,fname);
 });
});
</script>


<script>
document.addEventListener('DOMContentLoaded',()=>{
 const backupBtn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('데이터 백업'));
 const restoreBtn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('데이터 복원'));
 if(!backupBtn||!restoreBtn) return;

 backupBtn.onclick=()=>{
   const data={
     version:'V49.0',
     user:localStorage.getItem('depth_user_name')||'',
     records:JSON.parse(localStorage.getItem('depth_records_v42')||'[]')
   };
   const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
   const a=document.createElement('a');
   a.href=URL.createObjectURL(blob);
   const d=new Date();
   const f=`심도측정_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}${String(d.getSeconds()).padStart(2,'0')}.json`;
   a.download=f;
   a.click();
   URL.revokeObjectURL(a.href);
 };

 const input=document.createElement('input');
 input.type='file';
 input.accept='.json';
 input.style.display='none';
 document.body.appendChild(input);

 restoreBtn.onclick=()=>input.click();

 input.onchange=(e)=>{
   const file=e.target.files[0];
   if(!file) return;
   const fr=new FileReader();
   fr.onload=()=>{
     try{
       const obj=JSON.parse(fr.result);
       if(!obj.records) throw Error();
       if(!confirm('기존 데이터를 복원 데이터로 덮어쓰시겠습니까?')) return;
       localStorage.setItem('depth_records_v42',JSON.stringify(obj.records));
       if(obj.user) localStorage.setItem('depth_user_name',obj.user);
       alert('복원이 완료되었습니다. 화면을 새로고침합니다.');
       location.reload();
     }catch{
       alert('올바른 백업 파일이 아닙니다.');
     }
   };
   fr.readAsText(file);
 };
});
</script>





<script>
document.addEventListener('DOMContentLoaded',()=>{
  const btn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('심도 데이터 저장하기'));
  if(!btn||!window.visualViewport) return;
  const wrap=btn.parentElement;

  function updatePosition(){
    const vv=window.visualViewport;
    const keyboardOpen=vv.height < window.innerHeight-120;
    if(keyboardOpen){
      wrap.style.position='fixed';
      wrap.style.left='0';
      wrap.style.right='0';
      wrap.style.maxWidth='28rem';
      wrap.style.margin='0 auto';
      wrap.style.bottom=(window.innerHeight-vv.height-vv.offsetTop+10)+'px';
      wrap.style.zIndex='9999';
      wrap.style.transition='bottom .15s ease';
    }else{
      wrap.style.position='fixed';
      wrap.style.left='0';
      wrap.style.right='0';
      wrap.style.bottom='0';
      wrap.style.maxWidth='28rem';
      wrap.style.margin='0 auto';
    }
  }

  visualViewport.addEventListener('resize',updatePosition);
  visualViewport.addEventListener('scroll',updatePosition);
  window.addEventListener('resize',updatePosition);
  updatePosition();
});
</script>


<script>
async function reverseGeocode(lat,lng){
 const road=document.getElementById('roadAddr');
 const jibun=document.getElementById('jibunAddr');
 const gps=document.getElementById('gpsCoord');

 gps.textContent=`위도:${lat.toFixed(6)} / 경도:${lng.toFixed(6)} / 오차범위: ±${currentAcc || '-'}m`;

 try{
   const response=await fetch(
    `https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${lng}&y=${lat}`,
    {
      headers:{
        Authorization:'KakaoAK eaa5300f4046bfac8ce0355b1bd8cd88'
      }
    }
   );

   const data=await response.json();

   if(data.documents && data.documents.length){
      const doc=data.documents[0];
      road.textContent=doc.road_address?.address_name || doc.address?.address_name || '도로명 주소 없음';
      jibun.textContent=doc.address?.address_name || '지번 주소 없음';
      return;
   }
 }catch(e){}

 road.textContent='카카오 주소 조회 실패';
 jibun.textContent='인터넷 또는 API 설정 확인';
}
document.addEventListener('DOMContentLoaded',()=>{
 const gpsBtn=[...document.querySelectorAll('button')].find(b=>b.textContent.includes('현재 위치'));
 if(gpsBtn){
  gpsBtn.addEventListener('click',()=>{
   navigator.geolocation.getCurrentPosition(p=>{
    currentAcc=Math.round(p.coords.accuracy); reverseGeocode(p.coords.latitude,p.coords.longitude);
   },()=>alert('위치 권한을 허용해주세요.'),{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  });
 }
});

 document.addEventListener('DOMContentLoaded',()=>{
   if(navigator.geolocation){
     navigator.geolocation.getCurrentPosition(p=>{
       currentLat=p.coords.latitude;
       currentLng=p.coords.longitude;
       currentAcc=Math.round(p.coords.accuracy);
       reverseGeocode(currentLat,currentLng);
     },()=>{},{
       enableHighAccuracy:true,
       timeout:15000,
       maximumAge:0
     });
   }
 });

</script>


<script>
document.addEventListener('DOMContentLoaded',()=>{
  let retry=0;
  function autoGps(){
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(p=>{
      currentLat=p.coords.latitude;
      currentLng=p.coords.longitude;
      currentAcc=Math.round(p.coords.accuracy);
      if(typeof reverseGeocode==='function'){
        reverseGeocode(currentLat,currentLng);
      }
    },()=>{
      if(retry<2){
        retry++;
        setTimeout(autoGps,3000);
      }
    },{
      enableHighAccuracy:true,
      timeout:15000,
      maximumAge:0
    });
  }
  autoGps();
});
</script>
